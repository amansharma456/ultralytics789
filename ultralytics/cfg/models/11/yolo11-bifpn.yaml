# YOLO11 + BiFPN neck
# Backbone : stock YOLO11n
# Neck     : BiFPN with 4 levels [P3, P4, P5, P6]
# Head     : single Detect on [P3, P4, P5, P6]

nc: 1
scales:
  n: [0.50, 0.25, 1024]
  s: [0.50, 0.50, 1024]
  m: [0.50, 1.00,  512]
  l: [1.00, 1.00,  512]
  x: [1.00, 1.50,  512]

backbone:
  # [from, repeats, module, args]
  - [-1, 1, Conv,   [64, 3, 2]]          # 0   P1  stride 2
  - [-1, 1, Conv,   [128, 3, 2]]         # 1   P2  stride 4
  - [-1, 2, C3k2,   [256, False, 0.25]]  # 2
  - [-1, 1, Conv,   [256, 3, 2]]         # 3   stride 8
  - [-1, 2, C3k2,   [512, False, 0.25]]  # 4   P3 out  512ch  stride 8
  - [-1, 1, Conv,   [512, 3, 2]]         # 5   stride 16
  - [-1, 2, C3k2,   [512, True]]         # 6   P4 out  512ch  stride 16
  - [-1, 1, Conv,   [1024, 3, 2]]        # 7   stride 32
  - [-1, 2, C3k2,   [1024, True]]        # 8   P5 out  1024ch stride 32
  - [-1, 1, SPPF,   [1024, 5]]           # 9   SPPF    1024ch

head:
  # extra P6 scale by striding P5 once more
  - [-1,  1, Conv,  [1024, 3, 2]]        # 10  P6 1024ch stride 64

  # BiFPN: from=[P3,P4,P5,P6]=[4,6,9,10]
  # args=[num_channels=256, num_repeats=3]
  - [[4, 6, 9, 10], 1, BiFPN, [256, 3]]  # 11  output list [P3,P4,P5,P6] 256ch each

  # extract each fused scale
  - [11, 1, Index, [0]]                  # 12  P3_fused 256ch stride 8
  - [11, 1, Index, [1]]                  # 13  P4_fused 256ch stride 16
  - [11, 1, Index, [2]]                  # 14  P5_fused 256ch stride 32
  - [11, 1, Index, [3]]                  # 15  P6_fused 256ch stride 64

  # single Detect with 4 inputs
  - [[12, 13, 14, 15], 1, Detect, [nc]]  # 16  Detect P3/P4/P5/P6
