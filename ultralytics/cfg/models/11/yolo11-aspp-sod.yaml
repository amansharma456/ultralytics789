# YOLO11 + ASPP + SOD (P2 head)
# ASPP replaces SPPF at P5 for richer multi-scale context
# SOD: neck extended to P2, single Detect with 4 inputs
# No CBAM, no C3TR — clean isolated test of ASPP contribution

nc: 1
scale: s
scales:
  n: [0.50, 0.25, 1024]
  s: [0.50, 0.50, 1024]
  m: [0.50, 1.00,  512]
  l: [1.00, 1.00,  512]
  x: [1.00, 1.50,  512]

backbone:
  # [from, repeats, module, args]
  - [-1, 1, Conv,   [64, 3, 2]]             # 0  P1  stride 2
  - [-1, 1, Conv,   [128, 3, 2]]            # 1  P2  stride 4
  - [-1, 2, C3k2,   [256, False, 0.25]]     # 2  P2 stage
  - [-1, 1, Conv,   [256, 3, 2]]            # 3  stride 8
  - [-1, 2, C3k2,   [512, False, 0.25]]     # 4  P3 out
  - [-1, 1, Conv,   [512, 3, 2]]            # 5  stride 16
  - [-1, 2, C3k2,   [512, True]]            # 6  P4 out
  - [-1, 1, Conv,   [1024, 3, 2]]           # 7  stride 32
  - [-1, 2, C3k2,   [1024, True]]           # 8  P5 stage
  # ASPP replaces SPPF — captures dilated multi-scale context
  - [-1, 1, ASPP,   [1024]]                 # 9  ASPP at P5
  - [-1, 2, C2PSA,  [1024]]                 # 10 attention

head:
  # ── top-down: P5 → P4 → P3 → P2 ─────────────────────────────────
  - [-1,  1, Conv,         [512, 1, 1]]     # 11 lateral P5→512
  - [-1,  1, nn.Upsample,  [null, 2, "nearest"]]  # 12
  - [[6, -1], 1, Concat,   [1]]             # 13 cat P4
  - [-1,  2, C3k2,         [512, False]]    # 14 neck_P4

  - [-1,  1, Conv,         [256, 1, 1]]     # 15 lateral P4→256
  - [-1,  1, nn.Upsample,  [null, 2, "nearest"]]  # 16
  - [[4, -1], 1, Concat,   [1]]             # 17 cat P3
  - [-1,  2, C3k2,         [256, False]]    # 18 neck_P3

  - [-1,  1, Conv,         [128, 1, 1]]     # 19 lateral P3→128
  - [-1,  1, nn.Upsample,  [null, 2, "nearest"]]  # 20
  - [[2, -1], 1, Concat,   [1]]             # 21 cat P2
  - [-1,  2, C3k2,         [128, False]]    # 22 P2_out stride 4

  # ── bottom-up: P2 → P3 → P4 → P5 ────────────────────────────────
  - [-1,  1, Conv,         [256, 3, 2]]     # 23 down P2→P3
  - [[18, -1], 1, Concat,  [1]]             # 24 cat neck_P3
  - [-1,  2, C3k2,         [256, False]]    # 25 P3_out

  - [-1,  1, Conv,         [512, 3, 2]]     # 26 down P3→P4
  - [[14, -1], 1, Concat,  [1]]             # 27 cat neck_P4
  - [-1,  2, C3k2,         [512, False]]    # 28 P4_out

  - [-1,  1, Conv,         [1024, 3, 2]]    # 29 down P4→P5
  - [[10, -1], 1, Concat,  [1]]             # 30 cat C2PSA
  - [-1,  2, C3k2,         [1024, True]]    # 31 P5_out

  # ── single Detect [P2, P3, P4, P5] ──────────────────────────────
  - [[22, 25, 28, 31], 1, Detect, [nc]]     # 32
