# YOLOv8 + FNO Backbone — TB Bacilli Detection
# Backbone : 4-block FNO  [96, 192, 384, 768]  modes [20, 16, 12, 8]
# Neck     : YOLOv8 PAN-FPN (unchanged from stock) 
# Head     : YOLOv8 Detect 

nc: 1
scales:
  n: [0.33, 0.25, 1024]
  s: [0.33, 0.50, 1024]
  m: [0.67, 0.75,  768]
  l: [1.00, 1.00,  512]
  x: [1.00, 1.25,  512]

backbone:
  # [from, repeats, module,       args]
  # Layer 0: run all 4 FNO blocks, caches [P2, P3, P4, P5] in y[0]
  # Empty args — in_chans injected by parse_model; dims/modes use class defaults
  - [-1, 1, FNOBackbone,  []]

  # Layers 1-3: extract individual stages with Index(stage_idx)
  # Index(f=0, stage_idx) pulls element stage_idx from the list y[0]
  - [0,  1, Index,        [1]]   # layer 1 → P3  192ch  stride 8
  - [0,  1, Index,        [2]]   # layer 2 → P4  384ch  stride 16
  - [0,  1, Index,        [3]]   # layer 3 → P5  768ch  stride 32

head:
  # ── top-down path (P5 → P4 → P3) ────────────────────────────────────
  - [-1,  1, nn.Upsample,   [null, 2, "nearest"]]  # 4  upsample P5 → P4 scale
  - [[2, -1], 1, Concat,    [1]]                   # 5  cat P4(192→384) + up(768) = 1152ch
  - [-1,  3, C2f,           [384]]                 # 6  neck-P4

  - [-1,  1, nn.Upsample,   [null, 2, "nearest"]]  # 7  upsample → P3 scale
  - [[1, -1], 1, Concat,    [1]]                   # 8  cat P3(192) + up(384) = 576ch
  - [-1,  3, C2f,           [192]]                 # 9  P3_out  ← small objects

  # ── bottom-up path (P3 → P4 → P5) ───────────────────────────────────
  - [-1,  1, Conv,          [192, 3, 2]]           # 10 stride-2 downsample
  - [[6, -1], 1, Concat,    [1]]                   # 11 cat neck-P4(384) + down(192)
  - [-1,  3, C2f,           [384]]                 # 12 P4_out  ← medium objects

  - [-1,  1, Conv,          [384, 3, 2]]           # 13 stride-2 downsample
  - [[3, -1], 1, Concat,    [1]]                   # 14 cat P5(768) + down(384)
  - [-1,  3, C2f,           [768]]                 # 15 P5_out  ← large objects

  # ── detection head ───────────────────────────────────────────────────
  - [[9, 12, 15], 1, Detect, [nc]]                 # 16 Detect on P3/P4/P5
